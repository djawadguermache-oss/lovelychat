<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Chat</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #ffe4e1;
    margin: 0; padding: 0;
    display: flex; flex-direction: column;
    height: 100vh;
  }

  #controlPanel {
    display: flex; padding: 10px; justify-content: flex-start;
    background-color: #fff0f5;
    border-bottom: 2px solid #f5c6cb;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  #controlPanel label { font-size: 14px; margin-right: 10px; }
  #controlPanel input { margin-right: 10px; padding: 5px 10px; border-radius: 8px; border: 1px solid #ccc; }

  #chatContainer {
    flex: 1; overflow-y: auto; padding: 15px;
    display: flex; flex-direction: column;
    background-color: #fffaf0;
  }

  .message {
    margin: 5px 0; padding: 12px 15px;
    border-radius: 20px; max-width: 70%; font-size: 15px;
    word-wrap: break-word; box-shadow: 0 1px 5px rgba(0,0,0,0.1);
  }
  .me { background-color: #ffb6c1; align-self: flex-end; }
  .friend { background-color: #ffc0cb; align-self: flex-start; }

  #inputContainer {
    display: flex; padding: 10px;
    background-color: #fff0f5; border-top: 2px solid #f5c6cb;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
  }
  #messageInput { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; font-size: 15px; }
  #sendBtn {
    padding: 10px 18px; margin-left: 10px;
    border-radius: 20px; border: none;
    background-color: #ff6f91; color: #fff; cursor: pointer;
    font-weight: bold; transition: 0.2s;
  }
  #sendBtn:hover { background-color: #ff3c6e; }

  img.sticker { width: 50px; height: 50px; margin-left: 5px; cursor: pointer; transition: 0.2s; }
  img.sticker:hover { transform: scale(1.1); }
  img.chat-img { max-width: 150px; border-radius: 15px; margin-top:5px; }
</style>
</head>
<body>

<div id="nameScreen">
  <h2 style="text-align:center; margin-top: 20px;">Enter your name to start chatting</h2>
  <input type="text" id="userNameInput" placeholder="Your name..." style="width:70%; padding:10px; font-size:16px; margin-left:15%; margin-bottom:10px; border-radius: 15px; border:1px solid #ccc;">
  <button id="enterBtn" style="width:70%; padding:10px; font-size:16px; margin-left:15%; background-color:#ff6f91; color:white; border:none; border-radius:15px; cursor:pointer;">Enter Chat</button>
</div>

<div id="chatScreen" style="display:none; flex-direction:column; height:100vh;">
  <!-- Control Panel: only background color -->
  <div id="controlPanel">
    <label>Background color:</label>
    <input type="color" id="bgColorPicker" value="#ffe4e1">
  </div>

  <div id="chatContainer"></div>

  <div id="inputContainer">
    <input type="text" id="messageInput" placeholder="Type your message...">
    <button id="sendBtn">Send</button>
    <input type="file" id="imageInput" accept="image/*" style="margin-left:5px;">
    <img src="https://i.imgur.com/1.png" class="sticker" alt="Sticker1">
    <img src="https://i.imgur.com/2.png" class="sticker" alt="Sticker2">
  </div>
</div>

<script>
let userName = "";

const nameScreen = document.getElementById('nameScreen');
const enterBtn = document.getElementById('enterBtn');
const userNameInput = document.getElementById('userNameInput');

const chatScreen = document.getElementById('chatScreen');
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const stickers = document.querySelectorAll('img.sticker');
const imageInput = document.getElementById('imageInput');

const bgColorPicker = document.getElementById('bgColorPicker');

enterBtn.addEventListener('click', () => {
  const name = userNameInput.value.trim();
  if(name) {
    userName = name;
    nameScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
  }
});

function addMessage(content, sender) {
  const msgDiv = document.createElement('div');
  msgDiv.classList.add('message');
  if(sender === 'me') {
    msgDiv.classList.add('me');
    msgDiv.innerHTML = `<strong>${userName}:</strong> ${content}`;
  } else {
    msgDiv.classList.add('friend');
    msgDiv.innerHTML = content;
  }
  chatContainer.appendChild(msgDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

sendBtn.addEventListener('click', () => {
  const text = messageInput.value.trim();
  if(text) {
    addMessage(text, 'me');
    messageInput.value = '';
  }
});

messageInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendBtn.click();
});

stickers.forEach(sticker => {
  sticker.addEventListener('click', () => {
    addMessage(`<img src='${sticker.src}' class='chat-img'>`, 'me');
  });
});

imageInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      addMessage(`<img src='${e.target.result}' class='chat-img'>`, 'me');
    }
    reader.readAsDataURL(file);
    imageInput.value = '';
  }
});

// Only change background color
bgColorPicker.addEventListener('input', () => { document.body.style.backgroundColor = bgColorPicker.value; });
</script>
</body>
</html>
