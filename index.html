<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI, sans-serif;}
html,body{height:100%;background:#f0f4f8;}

#profileScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

#profileScreen input{
width:80%;
padding:14px;
border-radius:25px;
border:none;
margin:8px 0;
font-size:16px;
}

#profileScreen button{
width:80%;
padding:14px;
border-radius:25px;
border:none;
background:white;
color:#0277bd;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}
#profileScreen button:hover{background:#b3e5fc;}

#chatScreen{
display:none;
flex-direction:column;
height:100vh;
background:#e3f2fd;
}

#chatHeader{
background:#0277bd;
color:white;
padding:10px 15px;
display:flex;
align-items:center;
gap:12px;
position:sticky;
top:0;
z-index:10;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#chatHeader img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

#chatContainer{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.message{
padding:10px 14px;
border-radius:20px;
max-width:75%;
display:flex;
align-items:flex-start;
gap:8px;
word-wrap:break-word;
animation:fadeIn 0.2s ease-in-out;
}

.message.me{
background:#d1f8d1;
align-self:flex-end;
border-bottom-right-radius:5px;
}

.message.friend{
background:white;
align-self:flex-start;
border-bottom-left-radius:5px;
}

.message img.avatar{
width:28px;
height:28px;
border-radius:50%;
object-fit:cover;
}

#inputArea{
display:flex;
padding:10px;
background:#bbdefb;
align-items:center;
gap:8px;
}

#messageInput{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #0277bd;
outline:none;
font-size:15px;
}

#sendBtn{
padding:12px 18px;
border:none;
border-radius:50%;
background:#0277bd;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
}
#sendBtn:hover{background:#01579b;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div id="profileScreen">
<h2>Create Your Profile</h2>
<input type="text" id="userName" placeholder="Enter your name">
<input type="file" id="avatarInput" accept="image/*">
<button onclick="saveProfile()">Enter Chat</button>
</div>

<div id="chatScreen">
<div id="chatHeader">
<img id="myAvatar">
<span id="myName" style="font-weight:bold;"></span>
</div>

<div id="chatContainer"></div>

<div id="inputArea">
<input type="text" id="messageInput" placeholder="Type your message...">
<button id="sendBtn">➤</button>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2QPXYf9K8YHkKLcDP9a7phFeAuGPPgDc",
  authDomain: "friends-chat-40b5d.firebaseapp.com",
  projectId: "friends-chat-40b5d",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUserData = null;

// Anonymous login
auth.signInAnonymously();

auth.onAuthStateChanged(user=>{
if(user){
const saved = localStorage.getItem("profile");
if(saved){
currentUserData = JSON.parse(saved);
startChat();
}
}
});

function saveProfile(){
const name=document.getElementById("userName").value.trim();
const file=document.getElementById("avatarInput").files[0];
if(name && file){
const reader=new FileReader();
reader.onload=function(e){
currentUserData={
uid:auth.currentUser.uid,
name:name,
avatar:e.target.result
};
localStorage.setItem("profile",JSON.stringify(currentUserData));
startChat();
};
reader.readAsDataURL(file);
}
}

function startChat(){
document.getElementById("profileScreen").style.display="none";
document.getElementById("chatScreen").style.display="flex";
document.getElementById("myAvatar").src=currentUserData.avatar;
document.getElementById("myName").innerText=currentUserData.name;
}

document.getElementById("sendBtn").onclick=function(){
const text=document.getElementById("messageInput").value.trim();
if(text){
db.collection("messages").add({
uid:currentUserData.uid,
name:currentUserData.name,
avatar:currentUserData.avatar,
message:text,
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
document.getElementById("messageInput").value="";
}
};

document.getElementById("messageInput").addEventListener("keypress",e=>{
if(e.key==="Enter") document.getElementById("sendBtn").click();
});

db.collection("messages").orderBy("timestamp")
.onSnapshot(snapshot=>{
const chat=document.getElementById("chatContainer");
chat.innerHTML="";
snapshot.forEach(doc=>{
const data=doc.data();
const div=document.createElement("div");
div.classList.add("message");
div.classList.add(data.uid===currentUserData.uid?"me":"friend");

div.innerHTML=`
<img src="${data.avatar}" class="avatar">
<div>
<b>${data.name}</b><br>
${data.message}
</div>
`;
chat.appendChild(div);
});
chat.scrollTop=chat.scrollHeight;
});
</script>

</body>
</html>
