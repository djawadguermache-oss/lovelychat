<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Chat</title>

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
background:#ffe4e1;
}

#nameScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#nameScreen input{
width:80%;
padding:15px;
font-size:16px;
border-radius:20px;
border:1px solid #ccc;
margin-bottom:20px;
}

#nameScreen button{
width:80%;
padding:15px;
font-size:16px;
border-radius:20px;
border:none;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#chatScreen{
display:none;
flex-direction:column;
height:100vh;
}

#chatContainer{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
background:#fffaf0;
}

.message{
padding:10px 15px;
margin:5px 0;
border-radius:18px;
max-width:75%;
word-wrap:break-word;
}

.me{
background:#ffb6c1;
align-self:flex-end;
}

.friend{
background:#ffc0cb;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#fff0f5;
}

#messageInput{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
}

#sendBtn{
margin-left:8px;
padding:12px 18px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#imageInput{
display:none;
}

#imageBtn{
margin-left:8px;
padding:10px 14px;
background:#ff4d6d;
color:white;
border-radius:15px;
cursor:pointer;
}

img{
max-width:100%;
border-radius:12px;
margin-top:5px;
}
</style>
</head>

<body>

<div id="nameScreen">
<h2>ادخل اسمك</h2>
<input type="text" id="userName">
<button onclick="enterChat()">دخول</button>
</div>

<div id="chatScreen">
<div id="chatContainer"></div>

<div id="inputArea">
<input type="text" id="messageInput" placeholder="اكتب رسالة...">
<button id="sendBtn">ارسال</button>
<label id="imageBtn" for="imageInput">📷</label>
<input type="file" id="imageInput" accept="image/*">
</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD2QPXYf9K8YHkKLcDP9a7phFeAuGPPgDc",
  authDomain: "friends-chat-40b5d.firebaseapp.com",
  projectId: "friends-chat-40b5d",
  storageBucket: "friends-chat-40b5d.appspot.com",
  messagingSenderId: "409258273020",
  appId: "1:409258273020:web:f29dd0fbe7b95054ac8f79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";

function enterChat(){
const name = document.getElementById("userName").value.trim();
if(name){
currentUser = name;
document.getElementById("nameScreen").style.display="none";
document.getElementById("chatScreen").style.display="flex";
}
}

document.getElementById("sendBtn").onclick = function(){
const text = document.getElementById("messageInput").value.trim();
if(text){
db.collection("messages").add({
name:currentUser,
message:text,
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
document.getElementById("messageInput").value="";
}
};

document.getElementById("messageInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
document.getElementById("sendBtn").click();
}
});

document.getElementById("imageInput").addEventListener("change",function(e){
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload=function(event){
db.collection("messages").add({
name:currentUser,
message:"<img src='"+event.target.result+"'>",
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
};
reader.readAsDataURL(file);
}
});

db.collection("messages").orderBy("timestamp")
.onSnapshot(function(snapshot){
const chat = document.getElementById("chatContainer");
chat.innerHTML="";
snapshot.forEach(function(doc){
const data = doc.data();
const div = document.createElement("div");
div.classList.add("message");
div.classList.add(data.name===currentUser?"me":"friend");
div.innerHTML="<b>"+data.name+":</b> "+data.message;
chat.appendChild(div);
});
chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
